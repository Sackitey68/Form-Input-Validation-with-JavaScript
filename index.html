<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ========================================
         Project: Form Input Validation with JavaScript
         Author: Isaac Sackey Sackitey
         Program: ALT School - Backend Engineering
         Module: JavaScript Fundamentals
         Date: 10th May 2026
         ======================================== -->

    <main class="container">
      <h1>User Registration</h1>
      <p class="subtitle">Create your account to get started</p>

      <form id="registrationForm" novalidate>
        <!-- Full Name -->
        <div class="form-group">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            placeholder="John Doe"
            required
          />
          <small class="error-msg" id="fullNameError"></small>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="johndoe@example.com"
            required
          />
          <small class="error-msg" id="emailError"></small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="*********"
            required
          />
          <small class="error-msg" id="passwordError"></small>
          <small class="hint">Must include: uppercase, number, special character</small>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="**********"
            required
          />
          <small class="error-msg" id="confirmPasswordError"></small>
        </div>

        <!-- Age -->
        <div class="form-group">
          <label for="age">Age <span class="required">*</span></label>
          <input 
            type="number" 
            id="age" 
            name="age" 
            placeholder="25"
            min="1"
            max="120"
            required
          />
          <small class="error-msg" id="ageError"></small>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">Register Account</button>
      </form>

      <!-- Success Message (Hidden by Default) -->
      <div id="successMessage" class="success-msg hidden">
        ✅ Registration successful! Welcome, <span id="userNameDisplay"></span> 
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
